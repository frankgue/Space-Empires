name: space_empires
description: Space Themed Strategy Game in Flutter

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  # sdk: '>=2.12.0 <3.0.0'
  sdk: '>=3.0.0 <4.0.0' # Remplace 2.12.0 par 3.0.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  after_layout: ^1.1.0
  animated_text_kit: ^4.2.1
  carousel_slider: ^5.0.0
  flutter_staggered_grid_view: ^0.4.0 # Version plus stable pour Flutter 3
  # flutter_staggered_grid_view: ^0.7.0 # Version plus stable pour Flutter 3
  font_awesome_flutter: ^10.7.0
  # flutter_staggered_grid_view: ^0.4.0
  flutter_svg: ^2.2.4
  provider: ^6.1.5+1
  lottie: ^3.3.3
  # lottie: ^1.0.1
  sizer: ^3.1.3
  rive: ^0.13.0
  # rive: ^0.14.5
  shared_preferences: ^2.0.5
  url_launcher: ^6.2.1
  # url_launcher:
  fluttertoast: ^9.0.0
  in_app_review: ^2.0.2
  # font_awesome_flutter: ^9.1.0
  
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  lint: ^2.8.0

flutter:

  uses-material-design: true

  assets:
      - assets/animations/
      - assets/img/
      - assets/img/planets/
      - assets/img/buildings/
      - assets/img/ships/attack/
      - assets/img/ships/defense/
      - assets/img/control_deck/
      - assets/img/ruler/
      - assets/img/gifs/

  fonts:
    - family: Italianno
      fonts:
        - asset: assets/fonts/Italianno-Regular.ttf
          style: italic
    - family: Astral
      fonts:
        - asset: assets/fonts/Astral-Delight.ttf  

